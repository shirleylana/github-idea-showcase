<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A curated collection of GitHub projects">
    <title>Projects</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="profile" aria-labelledby="profile-name">
        <img id="profile-avatar" class="profile__avatar" alt="" hidden>
        <div>
          <p class="eyebrow">PROJECT NOTEBOOK</p>
          <h1 id="profile-name">Projects</h1>
          <p id="profile-bio" class="profile__bio"></p>
          <a id="profile-link" class="profile__link" href="#">View GitHub profile <span aria-hidden="true">↗</span></a>
        </div>
      </header>

      <section class="notebook" aria-labelledby="projects-heading">
        <h2 id="projects-heading" class="visually-hidden">Projects</h2>
        <nav id="category-tabs" class="tabs" role="tablist" aria-label="Project categories"></nav>
        <div class="notebook__paper">
          <p id="project-count" class="project-count" aria-live="polite"></p>
          <div id="project-grid" class="project-grid"></div>
          <p id="empty-state" class="empty-state" hidden>No projects in this category.</p>
        </div>
      </section>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
